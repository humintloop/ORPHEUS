<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Copper ambient glow on arms (faked with wide low-opacity stroke) -->
  <path d="M 28 20 C 4 24 4 78 28 82" stroke="#C87844" stroke-width="12" stroke-linecap="round" stroke-opacity="0.08"/>
  <path d="M 72 20 C 96 24 96 78 72 82" stroke="#C87844" stroke-width="12" stroke-linecap="round" stroke-opacity="0.08"/>

  <!-- Lyre arms — wide dramatic curves -->
  <path d="M 28 20 C 4 24 4 78 28 82" stroke="#C87844" stroke-width="4" stroke-linecap="round"/>
  <path d="M 72 20 C 96 24 96 78 72 82" stroke="#C87844" stroke-width="4" stroke-linecap="round"/>

  <!-- Top crossbar -->
  <line x1="24" y1="20" x2="76" y2="20" stroke="#C87844" stroke-width="4" stroke-linecap="round"/>

  <!-- Decorative knobs at crossbar ends -->
  <circle cx="24" cy="20" r="4" fill="#C87844"/>
  <circle cx="76" cy="20" r="4" fill="#C87844"/>

  <!-- Resonance body curve at base -->
  <path d="M 24 84 Q 50 98 76 84" stroke="#C87844" stroke-width="3.5" stroke-linecap="round"/>

  <!-- String attachment bar -->
  <line x1="33" y1="77" x2="67" y2="77" stroke="#C87844" stroke-width="3" stroke-linecap="round"/>

  <!-- Faint vertical strings (muted, behind signal) -->
  <line x1="38" y1="24" x2="38" y2="77" stroke="#C87844" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="44" y1="24" x2="44" y2="77" stroke="#C87844" stroke-width="1" stroke-opacity="0.16"/>
  <line x1="50" y1="24" x2="50" y2="77" stroke="#C87844" stroke-width="1" stroke-opacity="0.14"/>
  <line x1="56" y1="24" x2="56" y2="77" stroke="#C87844" stroke-width="1" stroke-opacity="0.16"/>
  <line x1="62" y1="24" x2="62" y2="77" stroke="#C87844" stroke-width="1" stroke-opacity="0.22"/>

  <!-- Signal waveform glow (wide, very low opacity) -->
  <path d="M 26 50 L 34 50 L 36 46 L 38 50 L 41 30 L 44 68 L 48 50 L 74 50"
        stroke="#00D4C8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.12"/>

  <!-- Signal waveform — the EKG through the lyre -->
  <path d="M 26 50 L 34 50 L 36 46 L 38 50 L 41 30 L 44 68 L 48 50 L 74 50"
        stroke="#00D4C8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>
