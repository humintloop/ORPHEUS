<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Lyre arms — outward curving, copper -->
  <path d="M 25 18 C 10 30 10 65 26 78" stroke="#C87844" stroke-width="7" stroke-linecap="round"/>
  <path d="M 75 18 C 90 30 90 65 74 78" stroke="#C87844" stroke-width="7" stroke-linecap="round"/>

  <!-- Top crossbar -->
  <line x1="22" y1="18" x2="78" y2="18" stroke="#C87844" stroke-width="7" stroke-linecap="round"/>

  <!-- Resonance body curve at base -->
  <path d="M 23 80 Q 50 96 77 80" stroke="#C87844" stroke-width="6" stroke-linecap="round"/>

  <!-- String attachment bar -->
  <line x1="32" y1="72" x2="68" y2="72" stroke="#C87844" stroke-width="4" stroke-linecap="round"/>

  <!-- 5 strings — signal descending into the dark -->
  <line x1="36" y1="22" x2="36" y2="72" stroke="#00D4C8" stroke-width="2" stroke-opacity="1"/>
  <line x1="43" y1="22" x2="43" y2="72" stroke="#00D4C8" stroke-width="2" stroke-opacity="0.7"/>
  <line x1="50" y1="22" x2="50" y2="72" stroke="#00D4C8" stroke-width="2" stroke-opacity="0.45"/>
  <line x1="57" y1="22" x2="57" y2="72" stroke="#00D4C8" stroke-width="2" stroke-opacity="0.25"/>
  <line x1="64" y1="22" x2="64" y2="72" stroke="#00D4C8" stroke-width="2" stroke-opacity="0.1"/>

  <!-- Signal — the point at the end of the descent -->
  <circle cx="36" cy="72" r="7" fill="#00D4C8" fill-opacity="0.12"/>
  <circle cx="36" cy="72" r="3.5" fill="#00D4C8"/>
</svg>
